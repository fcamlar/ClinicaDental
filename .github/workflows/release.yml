name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag a desplegar (vX.Y.Z)'
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '22.13.0'
  PNPM_VERSION: '9.15.0'

jobs:
  migrate:
    name: Aplicar migraciones a Supabase
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @castellar/db generate
      - name: Apply migrations
        env:
          DATABASE_MIGRATE_URL: ${{ secrets.DATABASE_MIGRATE_URL }}
        run: pnpm --filter @castellar/db migrate:deploy

  deploy-api:
    name: Desplegar API a Render
    runs-on: ubuntu-latest
    needs: migrate
    environment: production
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_API_DEPLOY_HOOK }}
        run: |
          curl --fail-with-body -X POST "$RENDER_DEPLOY_HOOK"

  deploy-web:
    name: Desplegar Web a Cloudflare Pages
    runs-on: ubuntu-latest
    needs: migrate
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @castellar/web build
      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: castellar-web
          directory: apps/web/.next
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  smoke:
    name: Smoke tests post-deploy
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-web]
    steps:
      - name: Probar /health
        run: |
          curl --fail --retry 5 --retry-delay 10 \
            "${{ secrets.PROD_API_URL }}/health"
      - name: Probar /ready
        run: |
          curl --fail --retry 5 --retry-delay 10 \
            "${{ secrets.PROD_API_URL }}/ready"
      - name: Probar landing
        run: |
          curl --fail --retry 5 --retry-delay 10 \
            "${{ secrets.PROD_WEB_URL }}"

  notify:
    name: Notificar release
    runs-on: ubuntu-latest
    needs: smoke
    if: always()
    steps:
      - name: Marcar release en Sentry
        if: success()
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: castellar
          RELEASE: ${{ github.ref_name }}
        run: |
          curl --fail -X POST "https://sentry.io/api/0/organizations/$SENTRY_ORG/releases/" \
            -H "Authorization: Bearer $SENTRY_AUTH_TOKEN" \
            -H 'Content-Type: application/json' \
            -d "{\"version\":\"$RELEASE\",\"projects\":[\"$SENTRY_PROJECT\"]}"
